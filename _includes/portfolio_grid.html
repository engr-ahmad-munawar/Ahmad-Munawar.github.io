<section id="portfolio">
  <div class="container portfolio-flex-grid">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Engineering Projects</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="portfolio-flex-row" style="display: flex; flex-wrap: wrap; justify-content: center;">
      
      {% for post in site.posts %}
      <div class="portfolio-flex-item portfolio-item" style="padding: 15px; width: 33.33%; min-width: 250px;">
        <a href="#portfolioModal-{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
          <div class="caption">
            <div class="caption-content">
              <i class="fa fa-search-plus fa-3x"></i>
            </div>
          </div>
          <img src="{{ '/img/portfolio/' | append: post.img | relative_url }}" class="img-responsive" alt="{{ post.alt }}">
        </a>
        <h3 class="text-center" style="font-size: 1.2em; margin-top: 10px; color: #2c3e50;">{{ post.title }}</h3>
      </div>
      {% endfor %}

    </div>
  </div>
</section>
